<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DLF DFG 3D Viewer testing environment</title>
    <link rel="shortcut icon" href="assets/img/dfgviewerFavicon.png" type="image/png">
    <link href="assets/css/main.css" rel="stylesheet" />
    <link href="assets/css/spinner.css" rel="stylesheet" />
    <link href="assets/css/theme.css" rel="stylesheet" />
    <link href="assets/css/external-sources.css" rel="stylesheet"/>
    <style>
      #test-model-picker {
        display: none;
        align-items: center;
        gap: 12px;
        margin: 16px;
        padding: 12px 14px;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        font:
          14px/1.4 "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }

      #test-model-picker label {
        font-weight: 600;
        color: #1f2937;
      }

      #test-model-picker select {
        min-width: 220px;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div id="test-model-picker">
      <label for="test-model-select">Load example model</label>
      <select id="test-model-select">
        <option value="./examples/box.dae">DAE</option>
        <option value="./examples/box.stl" selected>STL</option>
        <option value="./examples/box.ply">PLY</option>
        <option value="./examples/box.obj">OBJ</option>
        <option value="./examples/box.xyz">XYZ</option>
        <option value="./examples/box.pcd">PCD</option>
        <option value="./examples/box.3ds">3DS</option>
        <option value="./examples/box.ifc">IFC</option>
        <option value="./examples/box.fbx">FBX</option>
        <option value="./examples/box.glb">GLB</option>
        <option value="./examples/box-missing-mtl.obj">OBJ (missing MTL)</option>
        <option value="./examples/broken.glb">Broken GLB</option>
      </select>
    </div>
    <!--For in-built examples use one of the following 3d="./examples/box.obj"
        OR
        USE external samples:
    3d="https://3d-repository.hs-mainz.de/sites/default/files/2024-01/gltf/test2.glb"
    3d="https://raw.githubusercontent.com/IIIF/3d/main/assets/astronaut/astronaut.glb"-->
    <div
      id="DFG_3DViewer"
      3d="./examples/box.stl"
      style="height: 50vh"
    >
  </div>
    <script>
      (() => {
        const isLocalPreview = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
        if (!isLocalPreview) return;

        const picker = document.getElementById('test-model-picker');
        const select = document.getElementById('test-model-select');
        const viewer = document.getElementById('DFG_3DViewer');
        if (!picker || !select || !viewer) return;

        const url = new URL(window.location.href);
        const selectedModel =
          url.searchParams.get('model') ||
          window.localStorage.getItem('dfg3dviewer-test-model') ||
          viewer.getAttribute('3d') ||
          './examples/box.stl';

        picker.style.display = 'inline-flex';
        select.value = selectedModel;
        viewer.setAttribute('3d', selectedModel);

        select.addEventListener('change', () => {
          const nextModel = select.value;
          window.localStorage.setItem('dfg3dviewer-test-model', nextModel);
          url.searchParams.set('model', nextModel);
          window.location.href = url.toString();
        });
      })();
    </script>
    <script type="module" src="dfg_3dviewer-module.js"></script>
  </body>
</html>
